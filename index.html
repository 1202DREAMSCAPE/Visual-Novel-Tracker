<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN Library</title>
    <meta name="description" content="A beautiful visual novel tracker to log your library, routes, reviews, and favorites.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Navigation Letterboxd Style -->
    <header class="top-nav">
        <div class="nav-container">
            <div class="logo">
                <h1>VN Library</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="active" data-view="dashboard">Dashboard</a></li>
                <li><a href="#" data-view="library">Library</a></li>
                <li><a href="#" data-view="analytics">Analytics</a></li>
                <li><a href="#" data-view="add-game">Add Game</a></li>
            </ul>
            <div class="user-profile">
                <div class="avatar" id="avatar-btn"></div>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- Main Content Area -->
        <main class="main-content">
            <header class="page-header">
                <h2 id="page-title">Dashboard</h2>
            </header>

            <!-- Dynamic Views Container -->
            <div id="view-container" class="view-container">
                <!-- Views will be injected here via JS -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-content" id="modal-body">
            <!-- Modal content injected here -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
